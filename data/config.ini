[colors]
grisardoise = #373B41
grischarbon = #2e3436
white = #ffffff
noir = #000000
anthracite = #282A36
grisfonce = #CC282A36
grismoyen = #c0bfbc
bleuvert = #8abeb7
alert ="#CC5500"
grisfer = #707880
beigepur = #99F5F5DC
blancivoire = #99FFFFF0
blancantique = #99FAEBD7
saumonclairopaque = #FFA07A
saumonclair = #99FFA07A
saumonrose    = #99FF8C69
pechedoux    = #99FFDAB9
pechedouxopaque = #FFDAB9
cremedemaisopaque = #FFFF8DC
citronpale = #FFFACD
gold = #FFD700
moutardedouce = #E1AD01
background = ${colors.moutardedouce}
foreground = ${colors.noir}

[bar/ma_barre]
; --- POSITIONNEMENT & DIMENSIONS ---
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 22pt
offset-x = 0
fixed-center = true
enable-ipc = true
pseudo-transparency = true

; --- COMPORTEMENT (SpГ©cifique Openbox) ---
override-redirect = false
padding-top = 0
padding-bottom = 0
wm-name = polybar-barre
locale = fr_FR.UTF-8

; --- APPARENCE ---
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
padding-left = 1
padding-right = 1
module-margin = 1

; --- POLICES ---
font-0 = "Hack Nerd Font:style=Regular:size=10;2"
font-1 = "Hack Nerd Font Mono:style=Regular:size=12;2"
font-2 = "sans-serif:size=8;-4"     
font-3 = "sans-serif:size=8;8"   

; --- FUSION DES MODULES ---
modules-left = applicationsmenu xworkspaces fav-terminal fav-thunar show-desktop
modules-center = xwindow tasklist
modules-right = systray_etages systray cpu ram temp netspeed printer sound kdb-advanced powermenu date

; --- CONFIGURATION DU MODULE SYSTRAY ---
[module/systray]
type = internal/tray
tray-spacing = 8pt
tray-padding = 2px
tray-size = 16

[module/xworkspaces]
type = internal/xworkspaces

icon-0 = 1: Terminal;у°Ј†
icon-1 = 2: Bureau;у°Ј†

pin-workspaces = false
enable-click = true
enable-scroll = true
reverse-scroll = true

label-active = %icon%
label-active-background = #3b719f
label-active-foreground = #ffffff
label-active-overline = ${colors.noir}
label-active-padding = 1

label-occupied = %icon%
label-occupied-foreground = ${colors.noir}
label-occupied-underline = ${colors.noir}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = #ba2922
label-urgent-foreground = #ffffff
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.grisfer}
label-empty-padding = 1

[module/sep]
type = custom/text
format = " "
format-foreground = ${colors.grisfer}
format-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
label = %title%
label-maxlen = 40
label-empty = " у°Ј‡ Arch Linux "
label-empty-foreground = ${colors.grisfer}

[module/show-desktop]
type = custom/script
exec = echo "у°‡„ "
interval = 1
click-left = wmctrl -k on
click-right = wmctrl -k off
format-foreground = ${colors.noir}
format-padding = 1

[module/tasklist]
type = custom/script
exec = /usr/local/bin/tasklist
interval = 0.5
format = <label>
label = %output%
label-font = 2

[module/applicationsmenu]
type = custom/text
format = "у°Ј‡"
format-foreground = ${colors.noir}
click-left = /usr/local/bin/jg-launcher
click-right = /usr/local/bin/jg-launcher

[module/fav-terminal]
type = custom/text
format = "оћ•"
format-foreground = ${colors.noir}
click-left = /usr/local/bin/launcher-qterminal
click-right = /usr/local/bin/launcher-qterminal

[module/fav-thunar]
type = custom/text
format = "у°‰‹"
format-foreground = ${colors.noir}
click-left = ~/.config/openbox/scripts/toggle_app.sh "Thunar" "thunar"

[module/systray_etages]
type = custom/menu

# Formatage gГ©nГ©ral
expand-right = true
label-open = "у°Ќњ"
label-close = " у°„„ Quitter "
label-separator = " | "

# ==========================================
# Г‰TAGE 0 : Le Menu Principal
# ==========================================
menu-0-0 = "у°љ° Gestionnaire Paquets"
menu-0-0-exec = pamac-manager &

menu-0-1 = "уџ•  Presse-papier"
menu-0-1-exec = greenclip_gui &

menu-0-2 = "у°–© Journaux SystГЁme"
menu-0-2-exec = syslog_report

menu-0-3 = "уџ•  Aide"
menu-0-3-exec = help_center &

[module/cpu]
type = custom/script
exec = /usr/local/bin/cpu-tool
interval = 2
format-foreground = ${colors.noir}

[module/temp]
type = custom/script
exec = /usr/local/bin/temp-tool
interval = 2
format-foreground = ${colors.noir}

[module/ram]
type = custom/script
exec = /usr/local/bin/ram-tool
interval = 5
format-foreground = ${colors.noir}
click-right = /usr/local/bin//am_monitor
click-left = /usr/local/bin/ram_monitor

[module/netspeed]
type = custom/script
exec = /usr/local/bin/net-tool
interval = 1
click-right = /usr/local/bin/net-doctor
click-left = /usr/local/bin/net-doctor

[module/kdb-advanced]
type = custom/script
exec = /usr/local/bin/kbd_status
format-foreground = ${colors.foreground}
interval = 1
click-left = /usr/local/bin//kb-layout
click-right = /usr/local/bin/kb-layout

[module/systemlog]
type = custom/text
format = "у°„«" 
format-foreground = ${colors.noir}
click-left = /usr/local/bin/syslog_report
click-right = /usr/local/bin/syslog_report

[module/printer]
type = custom/text
format = "у°ђЄ"
format-foreground = ${colors.noir}
click-left = system-config-printer
click-right = system-config-printer

[module/sound]
type = custom/text
format = "у°•ї"
format-foreground = ${colors.noir}
click-left = pavucontrol-qt
click-right = pavucontrol-qt

[module/date]
type = custom/script
exec = /usr/local/bin/polybar_date
interval = 1
format-foreground = ${colors.noir}
format-underline =
module-margin = 1
click-left = /usr/local/bin/selectDate_libcb
click-right = /usr/local/bin/selectDate_libcb

[module/help-center]
type = custom/text
format = "п„Ё"
format-foreground = ${colors.noir}
click-left = /usr/local/bin/help_center
click-right = /usr/local/bin/help_center

[module/powermenu]
type = custom/text
format = "пЂ‘"
label-width = 24
label-alignment = right
label-background = #333
format-foreground = ${colors.alert}
click-left = /usr/local/bin/powermenu
click-right = /usr/local/bin/powermenu